<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slovo Translator</title>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; align-self: center; }
        
        h1 { text-align: center; color: var(--primary); margin: 0 0 20px 0; font-size: 24px; font-weight: 800; }
        
        .controls { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .field-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #666; }
        
        select, textarea { width: 100%; padding: 12px; border: 2px solid #eef0f2; border-radius: 12px; font-size: 16px; transition: 0.3s; background: #fff; }
        select { cursor: pointer; height: 48px; }
        
        .swap-btn { background: #f8f9fa; border: 2px solid #eef0f2; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; transition: 0.2s; }
        .swap-btn:hover { background: #e9ecef; border-color: var(--primary); color: var(--primary); }

        .input-wrapper { position: relative; margin-bottom: 15px; }
        textarea { height: 160px; resize: none; line-height: 1.5; font-family: inherit; }
        textarea:focus { border-color: var(--primary); outline: none; }

        .action-bar { display: flex; gap: 10px; margin-top: 8px; }
        .icon-btn { background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .icon-btn:hover { background: #eee; }

        .result-display { padding: 20px; background: #f8f9fa; border-radius: 12px; border-left: 6px solid var(--primary); min-height: 100px; font-size: 18px; white-space: pre-wrap; margin-top: 10px; color: #222; }
        
        .status-bar { display: flex; justify-content: space-between; margin-top: 15px; font-size: 11px; color: #999; border-top: 1px solid #eee; padding-top: 10px; }

        @media (max-width: 600px) {
            .controls { flex-direction: column; align-items: center; }
            .field-group { width: 100%; }
            .swap-btn { transform: rotate(90deg); margin: 5px 0; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="ui-title">Slovo Translator</h1>
    
    <div class="controls">
        <div class="field-group">
            <label id="ui-label-from">Język źródłowy</label>
            <select id="srcLang">
                <option value="auto">Wykryj język</option>
                <option value="slo">Slovian (Slavic)</option>
                <option value="pl">Polski</option>
                <option value="en">English</option>
                <option value="cs">Čeština</option>
                <option value="sk">Slovenčina</option>
                <option value="de">Deutsch</option>
                <option value="ru">Русский</option>
                <option value="fr">Français</option>
            </select>
        </div>
        
        <button class="swap-btn" onclick="swapLanguages()" title="Zamień języki">⇄</button>
        
        <div class="field-group">
            <label id="ui-label-to">Język docelowy</label>
            <select id="tgtLang">
                <option value="slo" selected>Slovian (Slavic)</option>
                <option value="pl">Polski</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="cs">Čeština</option>
            </select>
        </div>
    </div>

    <div class="input-wrapper">
        <textarea id="userInput" placeholder="..."></textarea>
        <div class="action-bar">
            <button class="icon-btn" onclick="pasteText()">📋 <span id="ui-paste">Wklej</span></button>
            <button class="icon-btn" onclick="clearText()">🗑️ <span id="ui-clear">Usuń</span></button>
        </div>
    </div>

    <div id="resultOutput" class="result-display"></div>
    
    <div class="action-bar" style="margin-top: 10px;">
        <button class="icon-btn" onclick="copyText()">✂️ <span id="ui-copy">Kopiuj wynik</span></button>
    </div>

    <div class="status-bar">
        <div id="dbStatus">Ładowanie bazy danych...</div>
        <div>Slovo Engine v3.0</div>
    </div>
</div>

<script>
    let plToSlo = {}, sloToPl = {};
    
    // Konfiguracja interfejsu zależna od języka SYSTEMU
    const uiLangs = {
        pl: { title: "🌐 Slovo Tłumacz", from: "Z języka:", to: "Na język:", paste: "Wklej", clear: "Usuń", copy: "Kopiuj", placeholder: "Zacznij pisać tutaj..." },
        en: { title: "🌐 Slovo Translator", from: "From:", to: "To:", paste: "Paste", clear: "Clear", copy: "Copy", placeholder: "Start typing..." },
        slo: { title: "🌐 Slovo Perkladačь", from: "Iz:", to: "Na:", paste: "Vstavi", clear: "Očisti", copy: "Kopi", placeholder: "Načni pisati..." }
    };

    async function init() {
        const sysLang = navigator.language.split('-')[0];
        applyUI(sysLang);
        
        const savedSrc = localStorage.getItem('srcLang') || 'auto';
        const savedTgt = localStorage.getItem('tgtLang') || 'slo';
        document.getElementById('srcLang').value = savedSrc;
        document.getElementById('tgtLang').value = savedTgt;

        await loadDictionaries();
        
        // Listenery
        document.getElementById('userInput').oninput = debounce(() => translate(), 400);
        document.getElementById('srcLang').onchange = () => { localStorage.setItem('srcLang', srcLang.value); translate(); };
        document.getElementById('tgtLang').onchange = () => { localStorage.setItem('tgtLang', tgtLang.value); translate(); };
    }

    function applyUI(lang) {
        const ui = uiLangs[lang] || uiLangs.en;
        document.getElementById('ui-title').innerText = ui.title;
        document.getElementById('ui-label-from').innerText = ui.from;
        document.getElementById('ui-label-to').innerText = ui.to;
        document.getElementById('ui-paste').innerText = ui.paste;
        document.getElementById('ui-clear').innerText = ui.clear;
        document.getElementById('ui-copy').innerText = ui.copy;
        document.getElementById('userInput').placeholder = ui.placeholder;
    }

    async function loadDictionaries() {
        try {
            const files = ['osnova.json', 'vuzor.json'];
            for (const file of files) {
                const res = await fetch(file);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(item => {
                        if (item.polish && item.slovian) {
                            plToSlo[item.polish.toLowerCase().trim()] = item.slovian.trim();
                            sloToPl[item.slovian.toLowerCase().trim()] = item.polish.trim();
                        }
                    });
                }
            }
            document.getElementById('dbStatus').innerText = "Baza gotowa.";
        } catch (e) { document.getElementById('dbStatus').innerText = "Błąd bazy."; }
    }

    async function translate() {
        const text = document.getElementById('userInput').value.trim();
        const src = document.getElementById('srcLang').value;
        const tgt = document.getElementById('tgtLang').value;
        const out = document.getElementById('resultOutput');

        if (!text) { out.innerText = ""; return; }

        try {
            let finalResult = "";
            if (src === 'slo' && tgt === 'pl') {
                finalResult = dictReplace(text, sloToPl);
            } else if (src === 'pl' && tgt === 'slo') {
                finalResult = dictReplace(text, plToSlo);
            } else if (src === 'slo') {
                const plBridge = dictReplace(text, sloToPl);
                finalResult = await google(plBridge, 'pl', tgt);
            } else if (tgt === 'slo') {
                const plBridge = await google(text, src, 'pl');
                finalResult = dictReplace(plBridge, plToSlo);
            } else {
                finalResult = await google(text, src, tgt);
            }
            out.innerText = finalResult || "";
        } catch (e) { out.innerText = "..."; }
    }

    async function google(text, s, t) {
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${s}&tl=${t}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            return data[0].map(x => x[0]).join('');
        } catch (e) { return text; }
    }

    function dictReplace(text, dict) {
        return text.replace(/[a-ząćęłńóśźżěьъ]+/gi, (m) => {
            const low = m.toLowerCase();
            if (dict[low]) {
                const r = dict[low];
                if (m === m.toUpperCase()) return r.toUpperCase();
                if (m[0] === m[0].toUpperCase()) return r.charAt(0).toUpperCase() + r.slice(1);
                return r;
            }
            return m;
        });
    }

    // Funkcje przycisków
    function swapLanguages() {
        const src = document.getElementById('srcLang');
        const tgt = document.getElementById('tgtLang');
        if (src.value === 'auto') return;
        const temp = src.value;
        src.value = tgt.value;
        tgt.value = temp;
        translate();
    }

    async function pasteText() {
        const text = await navigator.clipboard.readText();
        document.getElementById('userInput').value = text;
        translate();
    }

    function copyText() {
        const text = document.getElementById('resultOutput').innerText;
        navigator.clipboard.writeText(text);
    }

    function clearText() {
        document.getElementById('userInput').value = "";
        document.getElementById('resultOutput').innerText = "";
    }

    function debounce(func, wait) {
        let timeout;
        return function() {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, arguments), wait);
        };
    }

    init();
</script>
</body>
</html>
