<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slovo Translator</title>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; align-self: center; }
        h1 { text-align: center; color: var(--primary); margin: 0 0 20px 0; font-size: 26px; font-weight: 800; }
        .controls { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .field-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #666; }
        select, textarea { width: 100%; padding: 12px; border: 2px solid #eef0f2; border-radius: 12px; font-size: 16px; transition: 0.3s; background: #fff; color: #333; }
        select { cursor: pointer; height: 50px; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 40px; }
        .swap-btn { background: #f8f9fa; border: 2px solid #eef0f2; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; transition: 0.2s; font-size: 20px; }
        .swap-btn:hover { border-color: var(--primary); color: var(--primary); background: #fff; }
        textarea { height: 180px; resize: none; line-height: 1.5; margin-top: 10px; }
        .action-bar { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .icon-btn { background: #fff; border: 2px solid #eef0f2; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .icon-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .result-display { padding: 20px; background: #f8f9fa; border-radius: 12px; border-left: 6px solid var(--primary); min-height: 120px; font-size: 19px; white-space: pre-wrap; margin-top: 15px; color: #111; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .status-bar { display: flex; justify-content: space-between; margin-top: 20px; font-size: 11px; color: #aaa; border-top: 1px solid #eee; padding-top: 10px; }
        @media (max-width: 600px) { .controls { flex-direction: column; } .field-group { width: 100%; } .swap-btn { transform: rotate(90deg); align-self: center; } }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="ui-title">Slovo Translator</h1>
    
    <div class="controls">
        <div class="field-group">
            <label id="ui-label-from">From:</label>
            <select id="srcLang"></select>
        </div>
        
        <button class="swap-btn" onclick="swapLanguages()">⇄</button>
        
        <div class="field-group">
            <label id="ui-label-to">To:</label>
            <select id="tgtLang"></select>
        </div>
    </div>

    <textarea id="userInput" placeholder="..."></textarea>
    
    <div class="action-bar">
        <button class="icon-btn" onclick="pasteText()">📋 <span id="ui-paste">Paste</span></button>
        <button class="icon-btn" onclick="clearText()">🗑️ <span id="ui-clear">Clear</span></button>
        <button class="icon-btn" onclick="copyText()" style="margin-left: auto;">✂️ <span id="ui-copy">Copy</span></button>
    </div>

    <div id="resultOutput" class="result-display"></div>

    <div class="status-bar">
        <div id="dbStatus">Loading...</div>
        <div>Slovo Engine v4.0</div>
    </div>
</div>

<script>
    let plToSlo = {}, sloToPl = {};
    
    const languageData = [
        { code: 'en', pl: 'Angielski', en: 'English', slo: 'Angolьsky', de: 'Englisch' },
        { code: 'slo', pl: 'Słowiański', en: 'Slovian (Slavic)', slo: 'Slověnьsky', de: 'Slawisch' },
        { code: 'pl', pl: 'Polski', en: 'Polish', slo: 'Polьsky', de: 'Polnisch' },
        { code: 'de', pl: 'Niemiecki', en: 'German', slo: 'Nemьčьsky', de: 'Deutsch' },
        { code: 'cs', pl: 'Czeski', en: 'Czech', slo: 'Češьsky', de: 'Tschechisch' },
        { code: 'sk', pl: 'Słowacki', en: 'Slovak', slo: 'Slovačьsky', de: 'Slowakisch' },
        { code: 'ru', pl: 'Rosyjski', en: 'Russian', slo: 'Rusьsky', de: 'Russisch' },
        { code: 'fr', pl: 'Francuski', en: 'French', slo: 'Franьsky', de: 'Französisch' },
        { code: 'es', pl: 'Hiszpański', en: 'Spanish', slo: 'Španьsky', de: 'Spanisch' },
        { code: 'it', pl: 'Włoski', en: 'Italian', slo: 'Volšьsky', de: 'Italienisch' },
        { code: 'uk', pl: 'Ukraiński', en: 'Ukrainian', slo: 'Ukrajinьsky', de: 'Ukrainisch' }
    ];

    const uiTranslations = {
        pl: { title: "🌐 Slovo Tłumacz", from: "Z języka:", to: "Na język:", paste: "Wklej", clear: "Usuń", copy: "Kopiuj", placeholder: "Wpisz tekst..." },
        en: { title: "🌐 Slovo Translator", from: "From language:", to: "To language:", paste: "Paste", clear: "Clear", copy: "Copy", placeholder: "Type here..." },
        slo: { title: "🌐 Slovo Perkladačь", from: "Iz języka:", to: "Na język:", paste: "Vstavi", clear: "Izbriši", copy: "Kopi", placeholder: "Piši tu..." },
        de: { title: "🌐 Slovo Übersetzer", from: "Von:", to: "Nach:", paste: "Einfügen", clear: "Löschen", copy: "Kopieren", placeholder: "Text eingeben..." }
    };

    async function init() {
        // 1. Wykrywanie języka urządzenia
        const sysLang = navigator.language.split('-')[0];
        const uiKey = uiTranslations[sysLang] ? sysLang : 'en';
        
        // 2. Aplikowanie interfejsu i list
        applyUI(uiKey);
        populateLanguageLists(uiKey);
        
        // 3. Logika domyślnych języków tłumaczenia
        let defaultSrc = 'en';
        let defaultTgt = 'slo';

        // Jeśli system jest polski, ustaw domyślnie PL -> SLO
        if(sysLang === 'pl') { defaultSrc = 'pl'; }

        const savedSrc = localStorage.getItem('srcLang') || defaultSrc;
        const savedTgt = localStorage.getItem('tgtLang') || defaultTgt;
        
        document.getElementById('srcLang').value = savedSrc;
        document.getElementById('tgtLang').value = savedTgt;

        // 4. Ładowanie słowników
        await loadDictionaries();
        
        // Eventy
        document.getElementById('userInput').addEventListener('input', debounce(() => translate(), 300));
        document.getElementById('srcLang').onchange = (e) => { localStorage.setItem('srcLang', e.target.value); translate(); };
        document.getElementById('tgtLang').onchange = (e) => { localStorage.setItem('tgtLang', e.target.value); translate(); };
    }

    function applyUI(lang) {
        const ui = uiTranslations[lang] || uiTranslations.en;
        document.getElementById('ui-title').innerText = ui.title;
        document.getElementById('ui-label-from').innerText = ui.from;
        document.getElementById('ui-label-to').innerText = ui.to;
        document.getElementById('ui-paste').innerText = ui.paste;
        document.getElementById('ui-clear').innerText = ui.clear;
        document.getElementById('ui-copy').innerText = ui.copy;
        document.getElementById('userInput').placeholder = ui.placeholder;
    }

    function populateLanguageLists(uiLang) {
        const srcSelect = document.getElementById('srcLang');
        const tgtSelect = document.getElementById('tgtLang');
        
        srcSelect.options.length = 0;
        tgtSelect.options.length = 0;

        languageData.forEach(lang => {
            const name = lang[uiLang] || lang.en;
            srcSelect.add(new Option(name, lang.code));
            tgtSelect.add(new Option(name, lang.code));
        });
    }

    async function loadDictionaries() {
        const status = document.getElementById('dbStatus');
        try {
            const files = ['osnova.json', 'vuzor.json'];
            for (const file of files) {
                const res = await fetch(file);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(item => {
                        if (item.polish && item.slovian) {
                            plToSlo[item.polish.toLowerCase().trim()] = item.slovian.trim();
                            sloToPl[item.slovian.toLowerCase().trim()] = item.polish.trim();
                        }
                    });
                }
            }
            status.innerText = "Engine Ready.";
        } catch (e) { status.innerText = "Dict Error."; }
    }

    async function translate() {
        const text = document.getElementById('userInput').value.trim();
        const src = document.getElementById('srcLang').value;
        const tgt = document.getElementById('tgtLang').value;
        const out = document.getElementById('resultOutput');

        if (!text) { out.innerText = ""; return; }

        try {
            let finalResult = "";
            if (src === 'slo' && tgt === 'pl') {
                finalResult = dictReplace(text, sloToPl);
            } else if (src === 'pl' && tgt === 'slo') {
                finalResult = dictReplace(text, plToSlo);
            } else if (src === 'slo') {
                const bridge = dictReplace(text, sloToPl);
                finalResult = await google(bridge, 'pl', tgt);
            } else if (tgt === 'slo') {
                const bridge = await google(text, src, 'pl');
                finalResult = dictReplace(bridge, plToSlo);
            } else {
                finalResult = await google(text, src, tgt);
            }
            out.innerText = finalResult || "";
        } catch (e) { out.innerText = "Translation error..."; }
    }

    async function google(text, s, t) {
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${s}&tl=${t}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            return data[0].map(x => x[0]).join('');
        } catch (e) { return text; }
    }

    function dictReplace(text, dict) {
        return text.replace(/[a-ząćęłńóśźżěьъ]+/gi, (m) => {
            const low = m.toLowerCase();
            if (dict[low]) {
                const r = dict[low];
                if (m === m.toUpperCase()) return r.toUpperCase();
                if (m[0] === m[0].toUpperCase()) return r.charAt(0).toUpperCase() + r.slice(1);
                return r;
            }
            return m;
        });
    }

    function swapLanguages() {
        const src = document.getElementById('srcLang');
        const tgt = document.getElementById('tgtLang');
        const temp = src.value;
        src.value = tgt.value;
        tgt.value = temp;
        localStorage.setItem('srcLang', src.value);
        localStorage.setItem('tgtLang', tgt.value);
        translate();
    }

    async function pasteText() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('userInput').value = text;
            translate();
        } catch(e) { alert("Please allow clipboard access"); }
    }

    function copyText() {
        const text = document.getElementById('resultOutput').innerText;
        navigator.clipboard.writeText(text);
    }

    function clearText() {
        document.getElementById('userInput').value = "";
        document.getElementById('resultOutput').innerText = "";
    }

    function debounce(func, wait) {
        let timeout;
        return function() {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, arguments), wait);
        };
    }

    // Start
    window.onload = init;
</script>
</body>
</html>
