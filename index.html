<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slovo Translator Pro</title>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 800; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .field-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #666; }
        select, textarea { width: 100%; padding: 14px; border: 2px solid #eef0f2; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        textarea { height: 200px; resize: none; line-height: 1.6; }
        textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(0,123,255,0.1); }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #0056b3; transform: translateY(-2px); }
        .result-display { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 12px; border-left: 6px solid var(--primary); min-height: 80px; font-size: 19px; white-space: pre-wrap; position: relative; }
        .status-bar { display: flex; justify-content: space-between; margin-top: 15px; font-size: 12px; color: #999; }
        .lang-badge { padding: 2px 8px; background: #e0e0e0; border-radius: 4px; color: #444; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="ui-title">🌐 Slovo Translator</h1>
    
    <div class="controls">
        <div class="field-group">
            <label id="ui-label-from">Język źródłowy:</label>
            <select id="srcLang">
                <option value="auto">Wykryj automatycznie</option>
                <option value="slo">Słowiański (Slověnьsky)</option>
                <option value="pl">Polski</option>
                <option value="en">Angielski (English)</option>
                <option value="cs">Czeski (Čeština)</option>
                <option value="sk">Słowacki (Slovenčina)</option>
                <option value="ru">Rosyjski (Русский)</option>
                <option value="de">Niemiecki (Deutsch)</option>
                <option value="fr">Francuski (Français)</option>
                <option value="es">Hiszpański (Español)</option>
                <option value="it">Włoski (Italiano)</option>
                <option value="uk">Ukraiński (Українська)</option>
                <option value="be">Białoruski (Беларуская)</option>
                <option value="hr">Chorwacki (Hrvatski)</option>
                <option value="sr">Serbski (Српски)</option>
                <option value="sl">Słoweński (Slovenščina)</option>
                <option value="bg">Bułgarski (Български)</option>
            </select>
        </div>
        <div class="field-group">
            <label id="ui-label-to">Język docelowy:</label>
            <select id="tgtLang">
                <option value="slo">Słowiański (Slověnьsky)</option>
                <option value="pl">Polski</option>
                <option value="en">Angielski (English)</option>
                <option value="de">Niemiecki (Deutsch)</option>
                <option value="ru">Rosyjski (Русский)</option>
                <option value="cs">Czeski (Čeština)</option>
            </select>
        </div>
    </div>

    <textarea id="userInput" placeholder="Zacznij pisać..."></textarea>
    
    <button id="btnTranslate">🔄 Tłumacz / Preloži</button>

    <div id="resultOutput" class="result-display">...</div>

    <div class="status-bar">
        <div id="dbStatus">Ładowanie...</div>
        <div>Wykryto: <span id="detectedBadge" class="lang-badge">-</span></div>
    </div>
</div>

<script>
    let plToSlo = {}, sloToPl = {};
    const uiContent = {
        pl: { title: "🌐 Slovo Tłumacz", btn: "🔄 Tłumacz" },
        en: { title: "🌐 Slovo Translator", btn: "🔄 Translate" },
        slo: { title: "🌐 Slovo Perkladač", btn: "🔄 Perloži" }
    };

    // 1. Inicjalizacja i LocalStorage
    async function init() {
        const savedSrc = localStorage.getItem('srcLang') || 'auto';
        const savedTgt = localStorage.getItem('tgtLang') || 'slo';
        document.getElementById('srcLang').value = savedSrc;
        document.getElementById('tgtLang').value = savedTgt;

        await loadDictionaries();
        applyUI(savedSrc === 'auto' ? navigator.language.split('-')[0] : savedSrc);
        
        // Nasłuchiwanie zmian dla zapisu
        document.getElementById('srcLang').onchange = (e) => localStorage.setItem('srcLang', e.target.value);
        document.getElementById('tgtLang').onchange = (e) => localStorage.setItem('tgtLang', e.target.value);
        
        // Inteligentne wykrywanie podczas pisania
        document.getElementById('userInput').oninput = debounce(detectLanguage, 500);
    }

    async function loadDictionaries() {
        try {
            const files = ['osnova.json', 'vuzor.json'];
            for (const file of files) {
                const res = await fetch(file);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(item => {
                        if (item.polish && item.slovian) {
                            plToSlo[item.polish.toLowerCase().trim()] = item.slovian.trim();
                            sloToPl[item.slovian.toLowerCase().trim()] = item.polish.trim();
                        }
                    });
                }
            }
            document.getElementById('dbStatus').innerText = "Baza aktywna.";
        } catch (e) { console.error("DB Error"); }
    }

    // 2. Automatyczne wykrywanie języka (Baza + Google)
    async function detectLanguage() {
        const text = document.getElementById('userInput').value.trim();
        if (text.length < 3) return;

        const words = text.toLowerCase().split(/\s+/);
        let isSlovian = words.some(w => sloToPl[w]);

        if (isSlovian) {
            updateDetector('slo');
        } else {
            // Wykrywanie przez Google API
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                const detected = data[2]; // Kod języka
                updateDetector(detected);
            } catch (e) {}
        }
    }

    function updateDetector(langCode) {
        const badge = document.getElementById('detectedBadge');
        const srcSelect = document.getElementById('srcLang');
        
        badge.innerText = langCode.toUpperCase();
        
        // Jeśli ustawiono na "auto", przestawiamy widoczny wybór i UI
        if (srcSelect.value !== langCode && Array.from(srcSelect.options).some(o => o.value === langCode)) {
            srcSelect.value = langCode;
            applyUI(langCode);
        }
    }

    function applyUI(lang) {
        const langKey = uiContent[lang] ? lang : (uiContent[lang] ? lang : 'en');
        const content = uiContent[langKey] || uiContent.en;
        document.getElementById('ui-title').innerText = content.title;
        document.getElementById('ui-label-from').innerText = content.from;
        document.getElementById('ui-label-to').innerText = content.to;
        document.getElementById('btnTranslate').innerText = content.btn;
    }

    // 3. Logika Tłumaczenia (Bezpośrednia / Hybrydowa)
    async function translate() {
        const text = document.getElementById('userInput').value;
        const src = document.getElementById('srcLang').value;
        const tgt = document.getElementById('tgtLang').value;
        const out = document.getElementById('resultOutput');

        out.innerText = "...";

        try {
            let finalResult = "";
            if (src === 'slo' && tgt === 'pl') {
                finalResult = dictReplace(text, sloToPl);
            } else if (src === 'pl' && tgt === 'slo') {
                finalResult = dictReplace(text, plToSlo);
            } else if (src === 'slo') {
                const toPl = dictReplace(text, sloToPl);
                finalResult = await google(toPl, 'pl', tgt);
            } else if (tgt === 'slo') {
                const toPl = await google(text, src, 'pl');
                finalResult = dictReplace(toPl, plToSlo);
            } else {
                finalResult = await google(text, src, tgt);
            }
            out.innerText = finalResult;
        } catch (e) { out.innerText = "Error"; }
    }

    async function google(text, s, t) {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${s}&tl=${t}&dt=t&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        return data[0].map(x => x[0]).join('');
    }

    function dictReplace(text, dict) {
        return text.replace(/[a-ząćęłńóśźżěьъ]+/gi, (m) => {
            const low = m.toLowerCase();
            if (dict[low]) {
                const r = dict[low];
                if (m === m.toUpperCase()) return r.toUpperCase();
                if (m[0] === m[0].toUpperCase()) return r.charAt(0).toUpperCase() + r.slice(1);
                return r;
            }
            return m;
        });
    }

    function debounce(func, timeout = 300){
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    document.getElementById('btnTranslate').onclick = translate;
    init();
</script>
</body>
</html>
