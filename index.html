<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slovo Translator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container">
    <h1 id="ui-title">Slovo Translator</h1>
   
    <div class="controls">
        <div class="field-group">
            <label id="ui-label-from">From:</label>
            <select id="srcLang"></select>
        </div>
       
        <button class="swap-btn" onclick="swapLanguages()">⇄</button>
       
        <div class="field-group">
            <label id="ui-label-to">To:</label>
            <select id="tgtLang"></select>
        </div>
    </div>
    <div id="suggestionBox" style="display:none; color: #d93025; margin-bottom: 10px; font-size: 0.9em;"></div>
    <textarea id="userInput" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off" placeholder="..."></textarea>
   
    <div class="action-bar">
        <button class="icon-btn" onclick="pasteText()">📋 <span id="ui-paste">Paste</span></button>
        <button class="icon-btn" onclick="clearText()">🗑️ <span id="ui-clear">Clear</span></button>
        <button class="icon-btn" onclick="copyText()" style="margin-left: auto;">✂️ <span id="ui-copy">Copy</span></button>
    </div>
    <div id="resultOutput" class="result-display"></div>
    <div class="status-bar">
        <div id="dbStatus">Loading...</div>
        <div>Slovo Engine v4.0</div>
    </div>
</div>

<script src="slovo_model.js"></script>
<script src="script.js"></script>
<script src="slovo_ml_bridge.js"></script>
</body>
</html>
