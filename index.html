<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slovo Translator Pro</title>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #eef0f2; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-container { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 900px; 
            margin-top: 10px;
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            margin: 0 0 20px 0; 
            font-weight: 800; 
            font-size: clamp(20px, 5vw, 28px);
        }

        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 15px; 
        }

        @media (max-width: 600px) {
            .controls { grid-template-columns: 1fr; }
            .app-container { padding: 15px; border-radius: 0; margin-top: 0; }
            body { padding: 0; }
        }

        .field-group { display: flex; flex-direction: column; }
        
        label { 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 13px; 
            color: #666; 
            padding-left: 4px;
        }

        select, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid var(--border); 
            border-radius: 14px; 
            font-size: 16px; 
            background: #fff;
            transition: all 0.2s ease;
        }

        textarea { 
            height: 180px; 
            resize: none; 
            line-height: 1.5;
            margin-bottom: 10px;
        }

        textarea:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(0,123,255,0.1); 
        }

        .result-display { 
            padding: 18px; 
            background: #f8f9fa; 
            border-radius: 14px; 
            border-left: 6px solid var(--primary); 
            min-height: 100px; 
            font-size: 18px; 
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #222;
        }

        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-top: 15px; 
            font-size: 11px; 
            color: #999;
            padding: 0 5px;
        }

        .lang-badge { 
            padding: 3px 10px; 
            background: #e9ecef; 
            border-radius: 6px; 
            color: #495057; 
            font-weight: 700;
            text-transform: uppercase;
        }

        #btnTranslate { display: none; } /* Ukryty, bo teraz tłumaczy automatycznie */
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="ui-title">Slovo Translator</h1>
    
    <div class="controls">
        <div class="field-group">
            <label id="ui-label-from">Język źródłowy</label>
            <select id="srcLang">
                <option value="auto">Auto-detect</option>
                <option value="slo">Slověnьsky</option>
                <option value="pl">Polski</option>
                <option value="en">English</option>
                <option value="cs">Čeština</option>
                <option value="sk">Slovenčina</option>
                <option value="ru">Русский</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
                <option value="it">Italiano</option>
            </select>
        </div>
        <div class="field-group">
            <label id="ui-label-to">Język docelowy</label>
            <select id="tgtLang">
                <option value="slo">Slověnьsky</option>
                <option value="pl">Polski</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="ru">Русский</option>
            </select>
        </div>
    </div>

    <textarea id="userInput" placeholder="..."></textarea>
    <div id="resultOutput" class="result-display"></div>

    <div class="status-bar">
        <div id="dbStatus">Loading DB...</div>
        <div>Detected: <span id="detectedBadge" class="lang-badge">-</span></div>
    </div>
    <button id="btnTranslate">Translate</button>
</div>

<script>
    let plToSlo = {}, sloToPl = {};
    
    // Konfiguracja interfejsu zależna od języka urządzenia
    const uiLangs = {
        pl: { title: "🌐 Slovo Tłumacz", from: "Z języka:", to: "Na język:", placeholder: "Zacznij pisać...", db: "Baza aktywna" },
        en: { title: "🌐 Slovo Translator", from: "From:", to: "To:", placeholder: "Start typing...", db: "DB Ready" },
        slo: { title: "🌐 Slovo Perkladačь", from: "Iztočny język:", to: "Cěljovy język:", placeholder: "Načni pisati...", db: "Baza gotova" }
    };

    async function init() {
        // 1. Ustaw język interfejsu na podstawie urządzenia
        const deviceLang = navigator.language.split('-')[0];
        setupUI(deviceLang);

        // 2. Wczytaj bazy i ustawienia
        await loadDictionaries();
        const savedSrc = localStorage.getItem('srcLang') || 'auto';
        const savedTgt = localStorage.getItem('tgtLang') || 'slo';
        document.getElementById('srcLang').value = savedSrc;
        document.getElementById('tgtLang').value = savedTgt;

        // 3. Eventy
        document.getElementById('srcLang').onchange = (e) => {
            localStorage.setItem('srcLang', e.target.value);
            autoTranslate();
        };
        document.getElementById('tgtLang').onchange = (e) => {
            localStorage.setItem('tgtLang', e.target.value);
            autoTranslate();
        };
        
        // Tłumaczenie w czasie rzeczywistym
        document.getElementById('userInput').oninput = debounce(() => {
            detectAndTranslate();
        }, 400);
    }

    function setupUI(lang) {
        const ui = uiLangs[lang] || uiLangs.en;
        document.getElementById('ui-title').innerText = ui.title;
        document.getElementById('ui-label-from').innerText = ui.from;
        document.getElementById('ui-label-to').innerText = ui.to;
        document.getElementById('userInput').placeholder = ui.placeholder;
        window.currentUI = ui;
    }

    async function loadDictionaries() {
        try {
            const files = ['osnova.json', 'vuzor.json'];
            for (const file of files) {
                const res = await fetch(file);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(item => {
                        if (item.polish && item.slovian) {
                            plToSlo[item.polish.toLowerCase().trim()] = item.slovian.trim();
                            sloToPl[item.slovian.toLowerCase().trim()] = item.polish.trim();
                        }
                    });
                }
            }
            document.getElementById('dbStatus').innerText = window.currentUI.db;
        } catch (e) { document.getElementById('dbStatus').innerText = "DB Error"; }
    }

    async function detectAndTranslate() {
        const text = document.getElementById('userInput').value.trim();
        if (!text) {
            document.getElementById('resultOutput').innerText = "";
            return;
        }

        // Szybkie wykrywanie Słowiańskiego z bazy
        const words = text.toLowerCase().split(/\s+/);
        let isSlovian = words.some(w => sloToPl[w]);

        if (isSlovian) {
            updateDetectorUI('slo');
            autoTranslate();
        } else {
            // Wykrywanie Google
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                updateDetectorUI(data[2]);
                autoTranslate();
            } catch (e) { autoTranslate(); }
        }
    }

    function updateDetectorUI(langCode) {
        document.getElementById('detectedBadge').innerText = langCode;
        const srcSelect = document.getElementById('srcLang');
        if (srcSelect.value === 'auto' || srcSelect.value !== langCode) {
            if (Array.from(srcSelect.options).some(o => o.value === langCode)) {
                srcSelect.value = langCode;
            }
        }
    }

    async function autoTranslate() {
        const text = document.getElementById('userInput').value;
        const src = document.getElementById('srcLang').value;
        const tgt = document.getElementById('tgtLang').value;
        const out = document.getElementById('resultOutput');

        if (!text.trim()) return;

        try {
            let res = "";
            if (src === 'slo' && tgt === 'pl') res = dictReplace(text, sloToPl);
            else if (src === 'pl' && tgt === 'slo') res = dictReplace(text, plToSlo);
            else if (src === 'slo') {
                const mid = dictReplace(text, sloToPl);
                res = await googleFetch(mid, 'pl', tgt);
            } else if (tgt === 'slo') {
                const mid = await googleFetch(text, src, 'pl');
                res = dictReplace(mid, plToSlo);
            } else {
                res = await googleFetch(text, src, tgt);
            }
            out.innerText = res || "";
        } catch (e) { out.innerText = ""; }
    }

    async function googleFetch(text, s, t) {
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${s}&tl=${t}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            return data[0].map(x => x[0]).join('') || "";
        } catch { return text; }
    }

    function dictReplace(text, dict) {
        if (!text) return "";
        return text.replace(/[a-ząćęłńóśźżěьъ]+/gi, (m) => {
            const low = m.toLowerCase();
            if (dict[low]) {
                const r = dict[low];
                if (m === m.toUpperCase()) return r.toUpperCase();
                if (m[0] === m[0].toUpperCase()) return r.charAt(0).toUpperCase() + r.slice(1);
                return r;
            }
            return m;
        });
    }

    function debounce(func, wait) {
        let timeout;
        return function() {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, arguments), wait);
        };
    }

    window.onload = init;
</script>
</body>
</html>
