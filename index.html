<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slovo Translator</title>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; align-self: center; }
        h1 { text-align: center; color: var(--primary); margin: 0 0 20px 0; font-size: 26px; font-weight: 800; }
        .controls { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .field-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #666; }
        .lang-combobox { position: relative; width: 100%; }
        .lang-input { width: 100%; padding: 12px 40px 12px 12px; border: 2px solid #eef0f2; border-radius: 12px; font-size: 16px; background: #fff; color: #333; }
        .lang-input:focus { outline: none; border-color: var(--primary); }
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 2px solid #eef0f2; border-radius: 12px; max-height: 320px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.15); margin-top: 4px; }
        .dropdown.show { display: block; }
        .dropdown ul { list-style: none; padding: 4px 0; margin: 0; }
        .dropdown li { padding: 10px 16px; cursor: pointer; font-size: 16px; }
        .dropdown li:hover { background: #f0f7ff; }
        textarea { width: 100%; padding: 12px; border: 2px solid #eef0f2; border-radius: 12px; font-size: 16px; height: 180px; resize: none; line-height: 1.5; margin-top: 10px; }
        .action-bar { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .icon-btn { background: #fff; border: 2px solid #eef0f2; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .icon-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .result-display { padding: 20px; background: #f8f9fa; border-radius: 12px; border-left: 6px solid var(--primary); min-height: 120px; font-size: 19px; white-space: pre-wrap; margin-top: 15px; color: #111; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .status-bar { display: flex; justify-content: space-between; margin-top: 20px; font-size: 11px; color: #aaa; border-top: 1px solid #eee; padding-top: 10px; }
        .swap-btn { background: #f8f9fa; border: 2px solid #eef0f2; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; transition: 0.3s; font-size: 26px; box-shadow: 0 4px 12px rgba(0,123,255,0.2); }
        .swap-btn:hover { border-color: var(--primary); color: var(--primary); background: #fff; transform: rotate(180deg); }
        .engine-select { margin-top: 8px; padding: 6px 10px; border: 2px solid #eef0f2; border-radius: 8px; font-size: 13px; }
        @media (max-width: 600px) { .controls { flex-direction: column; } .field-group { width: 100%; } .swap-btn { transform: rotate(90deg); align-self: center; } }
    </style>
</head>
<body>
<div class="app-container">
    <h1 id="ui-title">Slovo Translator</h1>
   
    <div class="controls">
        <div class="field-group">
            <label id="ui-label-from">From:</label>
            <div class="lang-combobox">
                <input type="text" id="srcDisplay" class="lang-input" placeholder="Search language..." onfocus="showDropdown('src')" oninput="filterDropdown('src')">
                <input type="hidden" id="srcLang">
                <div id="srcDropdown" class="dropdown">
                    <ul id="srcOptions"></ul>
                </div>
            </div>
        </div>
       
        <button class="swap-btn" onclick="swapLanguages()" title="Zamień języki">⇄</button>
       
        <div class="field-group">
            <label id="ui-label-to">To:</label>
            <div class="lang-combobox">
                <input type="text" id="tgtDisplay" class="lang-input" placeholder="Search language..." onfocus="showDropdown('tgt')" oninput="filterDropdown('tgt')">
                <input type="hidden" id="tgtLang">
                <div id="tgtDropdown" class="dropdown">
                    <ul id="tgtOptions"></ul>
                </div>
            </div>
        </div>
    </div>

    <div style="margin: 8px 0;">
        <select id="engineSelect" class="engine-select" onchange="translate()">
            <option value="google">Google Translate</option>
            <option value="deepl">DeepL (Free)</option>
        </select>
    </div>

    <textarea id="userInput" placeholder="..."></textarea>
   
    <div class="action-bar">
        <button class="icon-btn" onclick="pasteText()">📋 <span id="ui-paste">Paste</span></button>
        <button class="icon-btn" onclick="clearText()">🗑️ <span id="ui-clear">Clear</span></button>
        <button class="icon-btn" onclick="copyText()" style="margin-left: auto;">✂️ <span id="ui-copy">Copy</span></button>
    </div>
    <div id="resultOutput" class="result-display"></div>
    <div class="status-bar">
        <div id="dbStatus">Loading...</div>
        <div>Slovo Engine v4.0</div>
    </div>
</div>
<script>
    let plToSlo = {}, sloToPl = {};
   
    const languageData = [ /* pełna lista z poprzedniej wersji - bez zmian */ 
        { code: 'af', pl: 'Afrikaans', en: 'Afrikaans', slo: 'Afrikańsky', de: 'Afrikaans' },
        { code: 'ar', pl: 'Arabski', en: 'Arabic', slo: 'Arabsky', de: 'Arabisch' },
        { code: 'be', pl: 'Białoruski', en: 'Belarusian', slo: 'Bělorusьsky', de: 'Weißrussisch' },
        { code: 'bg', pl: 'Bułgarski', en: 'Bulgarian', slo: 'Bъlgarsky', de: 'Bulgarisch' },
        { code: 'ca', pl: 'Kataloński', en: 'Catalan', slo: 'Katalańsky', de: 'Katalanisch' },
        { code: 'cs', pl: 'Czeski', en: 'Czech', slo: 'Češьsky', de: 'Tschechisch' },
        { code: 'da', pl: 'Duński', en: 'Danish', slo: 'Dańsky', de: 'Dänisch' },
        { code: 'de', pl: 'Niemiecki', en: 'German', slo: 'Nemьčьsky', de: 'Deutsch' },
        { code: 'el', pl: 'Grecki', en: 'Greek', slo: 'Grěčьsky', de: 'Griechisch' },
        { code: 'en', pl: 'Angielski', en: 'English', slo: 'Angolьsky', de: 'Englisch' },
        { code: 'es', pl: 'Hiszpański', en: 'Spanish', slo: 'Španьsky', de: 'Spanisch' },
        { code: 'fi', pl: 'Fiński', en: 'Finnish', slo: 'Finskьsky', de: 'Finnisch' },
        { code: 'fr', pl: 'Francuski', en: 'French', slo: 'Franьsky', de: 'Französisch' },
        { code: 'he', pl: 'Hebrajski', en: 'Hebrew', slo: 'Hebrejsky', de: 'Hebräisch' },
        { code: 'hi', pl: 'Hindi', en: 'Hindi', slo: 'Hindsky', de: 'Hindi' },
        { code: 'hu', pl: 'Węgierski', en: 'Hungarian', slo: 'Mad\'arsky', de: 'Ungarisch' },
        { code: 'id', pl: 'Indonezyjski', en: 'Indonesian', slo: 'Indonezijsky', de: 'Indonesisch' },
        { code: 'it', pl: 'Włoski', en: 'Italian', slo: 'Volšьsky', de: 'Italienisch' },
        { code: 'ja', pl: 'Japoński', en: 'Japanese', slo: 'Japońsky', de: 'Japanisch' },
        { code: 'ko', pl: 'Koreański', en: 'Korean', slo: 'Korejsky', de: 'Koreanisch' },
        { code: 'lt', pl: 'Litewski', en: 'Lithuanian', slo: 'Litovьsky', de: 'Litauisch' },
        { code: 'lv', pl: 'Łotewski', en: 'Latvian', slo: 'Latvьsky', de: 'Lettisch' },
        { code: 'nl', pl: 'Holenderski', en: 'Dutch', slo: 'Niderlandьsky', de: 'Niederländisch' },
        { code: 'no', pl: 'Norweski', en: 'Norwegian', slo: 'Norvežsky', de: 'Norwegisch' },
        { code: 'pl', pl: 'Polski', en: 'Polish', slo: 'Polьsky', de: 'Polnisch' },
        { code: 'pt', pl: 'Portugalski', en: 'Portuguese', slo: 'Portugalьsky', de: 'Portugiesisch' },
        { code: 'ro', pl: 'Rumuński', en: 'Romanian', slo: 'Rumunьsky', de: 'Rumänisch' },
        { code: 'ru', pl: 'Rosyjski', en: 'Russian', slo: 'Rusьsky', de: 'Russisch' },
        { code: 'sk', pl: 'Słowacki', en: 'Slovak', slo: 'Slovačьsky', de: 'Slowakisch' },
        { code: 'slo', pl: 'Słowiański', en: 'Slovian (Slavic)', slo: 'Slověnьsky', de: 'Slawisch' },
        { code: 'sv', pl: 'Szwedzki', en: 'Swedish', slo: 'Švedьsky', de: 'Schwedisch' },
        { code: 'tr', pl: 'Turecki', en: 'Turkish', slo: 'Turecьky', de: 'Türkisch' },
        { code: 'uk', pl: 'Ukraiński', en: 'Ukrainian', slo: 'Ukrajinьsky', de: 'Ukrainisch' },
        { code: 'vi', pl: 'Wietnamski', en: 'Vietnamese', slo: 'V\'etnamsky', de: 'Vietnamesisch' },
        { code: 'zh', pl: 'Chiński', en: 'Chinese', slo: 'Kitajsky', de: 'Chinesisch' }
    ];

    const uiTranslations = {
        pl: { title: "🌐 Slovo Tłumacz", from: "Z języka:", to: "Na język:", paste: "Wklej", clear: "Usuń", copy: "Kopiuj", placeholder: "Wpisz tekst...", search: "Szukaj języka..." },
        en: { title: "🌐 Slovo Translator", from: "From language:", to: "To language:", paste: "Paste", clear: "Clear", copy: "Copy", placeholder: "Type here...", search: "Search language..." },
        slo: { title: "🌐 Slovo Perkladačь", from: "Jiz ęzyka:", to: "Na ęzyk:", paste: "Vyloži", clear: "Terbi", copy: "Poveli", placeholder: "Piši tu...", search: "Išči ęzyk..." },
        de: { title: "🌐 Slovo Übersetzer", from: "Von:", to: "Nach:", paste: "Einfügen", clear: "Löschen", copy: "Kopieren", placeholder: "Text eingeben...", search: "Sprache suchen..." }
    };

    // === DEEPL CONFIG ===
    // Wstaw tutaj swój klucz DeepL Free (jeśli masz). Inaczej zostanie użyty Google.
    const DEEPL_AUTH_KEY = ""; // ← wpisz swój klucz DeepL Free tutaj

    async function init() {
        const sysLang = navigator.language.split('-')[0];
        const uiKey = uiTranslations[sysLang] ? sysLang : 'en';
       
        applyUI(uiKey);
        populateDropdowns(uiKey);
       
        let defaultSrc = languageData.some(l => l.code === sysLang) ? sysLang : 'en';
        let defaultTgt = 'slo';
        
        const savedSrc = localStorage.getItem('srcLang') || defaultSrc;
        const savedTgt = localStorage.getItem('tgtLang') || defaultTgt;
       
        setLanguage('src', savedSrc, uiKey);
        setLanguage('tgt', savedTgt, uiKey);
       
        await loadDictionaries();
       
        document.getElementById('userInput').addEventListener('input', debounce(() => translate(), 400));
       
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.lang-combobox')) hideAllDropdowns();
        });
    }

    // ... (applyUI, populateDropdowns, setLanguage, selectLanguage, showDropdown, hideAllDropdowns, filterDropdown - bez zmian jak w poprzedniej wersji)

    function applyUI(lang) { /* bez zmian */ }
    function populateDropdowns(uiLang) { /* bez zmian */ }
    function setLanguage(prefix, code, uiLang) { /* bez zmian */ }
    function selectLanguage(prefix, code, name) { /* bez zmian */ }
    function showDropdown(prefix) { /* bez zmian */ }
    function hideAllDropdowns() { /* bez zmian */ }
    function filterDropdown(prefix) { /* bez zmian */ }

    async function loadDictionaries() { /* bez zmian */ }

    async function translate() {
        const text = document.getElementById('userInput').value.trim();
        const src = document.getElementById('srcLang').value;
        const tgt = document.getElementById('tgtLang').value;
        const engine = document.getElementById('engineSelect').value;
        const out = document.getElementById('resultOutput');
        if (!text) { out.innerText = ""; return; }

        try {
            let finalResult = "";
            const useDeepL = (engine === "deepl" && DEEPL_AUTH_KEY);

            if (src === 'slo' && tgt === 'pl') {
                finalResult = dictReplace(text, sloToPl);
            } else if (src === 'pl' && tgt === 'slo') {
                finalResult = dictReplace(text, plToSlo);
            } else if (src === 'slo') {
                const bridge = dictReplace(text, sloToPl);
                finalResult = useDeepL ? await deeplTranslate(bridge, 'PL', tgt.toUpperCase()) : await google(bridge, 'pl', tgt);
            } else if (tgt === 'slo') {
                const bridge = useDeepL ? await deeplTranslate(text, src.toUpperCase(), 'PL') : await google(text, src, 'pl');
                finalResult = dictReplace(bridge, plToSlo);
            } else {
                finalResult = useDeepL ? await deeplTranslate(text, src.toUpperCase(), tgt.toUpperCase()) : await google(text, src, tgt);
            }
            out.innerText = finalResult || text;
        } catch (e) {
            out.innerText = "Translation error...";
        }
    }

    async function google(text, s, t) {
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${s}&tl=${t}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            return data[0].map(x => x[0]).join('');
        } catch (e) { return text; }
    }

    async function deeplTranslate(text, sourceLang, targetLang) {
        if (!DEEPL_AUTH_KEY) return text;
        try {
            const url = "https://api-free.deepl.com/v2/translate";
            const formData = new URLSearchParams();
            formData.append("auth_key", DEEPL_AUTH_KEY);
            formData.append("text", text);
            formData.append("target_lang", targetLang);
            if (sourceLang && sourceLang !== "AUTO") formData.append("source_lang", sourceLang);

            const res = await fetch(url, {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            return data.translations && data.translations[0] ? data.translations[0].text : text;
        } catch (e) {
            console.warn("DeepL error, fallback to Google");
            return text;
        }
    }

    function dictReplace(text, dict) { /* bez zmian */ }

    function swapLanguages() { /* bez zmian z poprzedniej wersji (zamiana pól + treści) */ 
        const srcCode = document.getElementById('srcLang').value;
        const tgtCode = document.getElementById('tgtLang').value;
        const srcName = document.getElementById('srcDisplay').value;
        const tgtName = document.getElementById('tgtDisplay').value;

        document.getElementById('srcLang').value = tgtCode;
        document.getElementById('srcDisplay').value = tgtName;
        document.getElementById('tgtLang').value = srcCode;
        document.getElementById('tgtDisplay').value = srcName;

        const inputEl = document.getElementById('userInput');
        const resultEl = document.getElementById('resultOutput');
        const temp = inputEl.value;
        inputEl.value = resultEl.innerText;
        resultEl.innerText = "";

        localStorage.setItem('srcLang', tgtCode);
        localStorage.setItem('tgtLang', srcCode);
        
        translate();
    }

    async function pasteText() { /* bez zmian */ }
    function copyText() { /* bez zmian */ }
    function clearText() { /* bez zmian */ }
    function debounce(func, wait) { /* bez zmian */ }

    window.onload = init;
</script>
</body>
</html>
