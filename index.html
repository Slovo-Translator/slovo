<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slovo Translator</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { color: #333; text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        textarea { height: 180px; resize: vertical; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .result-box { margin-top: 25px; padding: 20px; background: #e9ecef; border-radius: 8px; min-height: 50px; font-size: 18px; line-height: 1.6; color: #222; border-left: 5px solid var(--primary); }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌐 Slovo Translator</h1>
    
    <div class="grid">
        <div>
            <label>Z języka:</label>
            <select id="srcLang">
                <option value="auto">Wykryj automatycznie</option>
                <option value="pl">Polski</option>
                <option value="en">Angielski</option>
                <option value="de">Niemiecki</option>
                <option value="fr">Francuski</option>
                <option value="slo">Słowiański</option>
            </select>
        </div>
        <div>
            <label>Na język:</label>
            <select id="tgtLang">
                <option value="slo" selected>Słowiański</option>
                <option value="pl">Polski</option>
                <option value="en">Angielski</option>
                <option value="de">Niemiecki</option>
            </select>
        </div>
    </div>

    <textarea id="userInput" placeholder="Wpisz tekst do przetłumaczenia..."></textarea>
    <button onclick="handleTranslate()">🔄 Tłumacz teraz</button>

    <div id="resultOutput" class="result-box">Wynik tłumaczenia pojawi się tutaj...</div>
</div>

<script>
    let plToSlo = {};
    let sloToPl = {};

    // 1. Ładowanie słowników
    async function init() {
        try {
            const files = ['osnova.json', 'vuzor.json'];
            for (const file of files) {
                const res = await fetch(file);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(e => {
                        if (e.polish && e.slovian) {
                            const p = e.polish.toLowerCase().trim();
                            const s = e.slovian.trim();
                            plToSlo[p] = s;
                            sloToPl[s.toLowerCase()] = p;
                        }
                    });
                }
            }
            console.log("Słowniki załadowane.");
        } catch (e) { console.error("Błąd bazy danych:", e); }
    }

    // 2. Funkcja pomocnicza Google Translate
    async function googleTranslate(text, sl, tl) {
        if (sl === tl) return text;
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURI(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        return data[0].map(x => x[0]).join('');
    }

    // 3. Logika słownikowa (z zachowaniem wielkości liter)
    function dictReplace(text, dict) {
        return text.replace(/\b\w+\b/g, (word) => {
            const low = word.toLowerCase();
            if (dict[low]) {
                const res = dict[low];
                if (word === word.toUpperCase()) return res.toUpperCase();
                if (word[0] === word[0].toUpperCase()) return res.charAt(0).toUpperCase() + res.slice(1);
                return res;
            }
            return word;
        });
    }

    // 4. GŁÓWNA LOGIKA: Mostek przez Język Polski
    async function handleTranslate() {
        const text = document.getElementById('userInput').value;
        const src = document.getElementById('srcLang').value;
        const tgt = document.getElementById('tgtLang').value;
        const out = document.getElementById('resultOutput');

        if (!text.trim()) return;
        out.innerText = "Tłumaczenie...";

        try {
            let polishStep = "";

            // ETAP I: Do Polskiego
            if (src === 'slo') {
                polishStep = dictReplace(text, sloToPl);
            } else if (src === 'pl') {
                polishStep = text;
            } else {
                polishStep = await googleTranslate(text, src, 'pl');
            }

            // ETAP II: Z Polskiego na Cel
            if (tgt === 'slo') {
                out.innerText = dictReplace(polishStep, plToSlo);
            } else if (tgt === 'pl') {
                out.innerText = polishStep;
            } else {
                out.innerText = await googleTranslate(polishStep, 'pl', tgt);
            }
        } catch (e) {
            out.innerText = "Błąd połączenia. Spróbuj ponownie.";
        }
    }

    init();
</script>
</body>
</html>
