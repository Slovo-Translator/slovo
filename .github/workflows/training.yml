name: Slovian Engine

on:
  push:
    paths:
      - '**.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # KLUCZOWA POPRAWKA: Nadanie uprawnień do zapisu
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Learning Script
        run: python app.py

      - name: Save Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'SlovianBot'
          git config --global user.email 'bot@slovian.org'
          
          # Dodajemy zmiany, jeśli plik osnova.json istnieje
          if [ -f osnova.json ]; then
            git add osnova.json
            git commit -m "Auto-clean dictionary: $(date +'%Y-%m-%d %H:%M')" || exit 0
            # Bezpieczny push z tokenem
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          else
            echo "Nie znaleziono pliku osnova.json - sprawdź czy app.py go tworzy."
            exit 1
          fi
